<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Lớp Khối 6 - Trung Tâm Thăng Long</title>
    <link rel="icon" type="image/png" href="logo-tab.png">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        
        /* NỀN XÁM KEM SÁNG THEO ẢNH CỦA BẠN */
        body { 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #eef2f7;
            padding: 24px;
            overflow-x: hidden;
        }

        .container-wrapper {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* KHU VỰC LOGO */
        .brand-section {
            margin-bottom: 25px;
        }

        .brand-logo {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            background: #eef2f7;
            padding: 6px;
            /* Đổ bóng kiểu Neumorphism cho logo */
            box-shadow: 
                6px 6px 12px #d1d9e6, 
                -6px -6px 12px #ffffff;
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-top: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* KHỐI CARD CHỨA CHÍNH VỚI ĐỔ BÓNG CHÌM TẦNG NỀN */
        .selection-card {
            background: #eef2f7;
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 
                9px 9px 16px #d1d9e6, 
                -9px -9px 16px #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            color: #1a365d; 
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-subtitle {
            font-size: 13.5px;
            color: #718096;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* KHU VỰC TẠO HIỆU ỨNG XẾP TẦNG */
        .class-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 25px;
        }

        .class-item-link {
            text-decoration: none;
            color: inherit;
            outline: none;
            /* Phục vụ cho hiệu ứng tầng tầng lớp lớp xuất hiện */
            opacity: 0;
            transform: translateY(25px);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Khi kích hoạt hiệu ứng tầng */
        .class-item-link.layer-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* CHI TIẾT HỘP LỚP HỌC NỔI KHỐI MỊN */
        .class-box {
            width: 100%;
            padding: 18px 20px;
            background: #eef2f7;
            border-radius: 16px;
            font-size: 16.5px;
            font-weight: 600;
            color: #4a5568;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Đổ bóng tạo chiều sâu tầng nổi */
            box-shadow: 
                5px 5px 10px #d1d9e6, 
                -5px -5px 10px #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Khi di chuột: Hộp sẽ lún nhẹ hoặc nổi cao tùy chỉnh, ở đây làm nổi mịn và đổi tông xanh nhẹ */
        .class-box:hover {
            color: #2b6cb0;
            background: #edf2f7;
            transform: translateY(-2px);
            box-shadow: 
                8px 8px 16px #c4cddb, 
                -8px -8px 16px #ffffff;
        }

        /* Khi click đè chuột vào (Hiệu ứng nhấn nút lún xuống thực tế) */
        .class-box:active {
            transform: translateY(1px);
            box-shadow: 
                inset 4px 4px 8px #d1d9e6, 
                inset -4px -4px 8px #ffffff;
        }

        /* AI CẬP NHẬT BIỂU TƯỢNG MŨI TÊN TẦNG TRÊN */
        .class-icon {
            font-size: 14px;
            color: #718096;
            background: #eef2f7;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 
                3px 3px 6px #d1d9e6, 
                -3px -3px 6px #ffffff;
            transition: all 0.3s ease;
        }
        
        .class-box:hover .class-icon {
            color: #ffffff;
            background: #3182ce;
            box-shadow: 0 4px 10px rgba(49, 130, 206, 0.3);
            transform: translateX(3px);
        }

        /* NÚT QUAY LẠI TRANG CHỦ PHÍA DƯỚI */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            color: #718096;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        
        .back-home-btn:hover {
            color: #1a365d;
            background: rgba(210, 218, 230, 0.4);
        }
    </style>
</head>
<body>

    <div class="container-wrapper">
        
        <div class="brand-section">
            <img src="logo-tab.png" alt="Logo Trung Tâm Thăng Long" class="brand-logo">
            <div class="brand-name">TRUNG TÂM THĂNG LONG</div>
        </div>

        <div class="selection-card">
            <h2 class="section-title">Danh sách lớp học</h2>
            <p class="section-subtitle">Phụ huynh vui lòng chọn chính xác lớp học của con</p>
            
            <div class="class-list">
                <a href="6t3b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 6T3B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="6t4b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 6T4B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="6t5b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 6T5B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>
            </div>
            
            <a href="index.html" class="back-home-btn">⬅ Quay lại Trang chủ chính</a>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Lấy tất cả các thẻ liên kết lớp học
            const classItems = document.querySelectorAll('.class-item-link');
            
            // Lặp qua từng phần tử và kích hoạt hiệu ứng cách nhau 100ms (0.1 giây)
            classItems.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('layer-visible');
                }, index * 120); // Tầng 1 hiện -> 0.12s sau tầng 2 hiện -> 0.24s sau tầng 3 hiện
            });
        });
    </script>
</body>
</html>
